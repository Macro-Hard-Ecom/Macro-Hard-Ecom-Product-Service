name: Product Service CI/CD Pipeline

# ─── Trigger ───────────────────────────────────────────────────────────────
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# ─── Environment Variables ─────────────────────────────────────────────────
env:
  ECR_REPOSITORY: product-service        # Your ECR repository name
  IMAGE_TAG: ${{ github.sha }}           # Use commit SHA as image tag for traceability
  PORT: 3000

jobs:
  # ───────────────────────────────────────────────────────────────────────────
  # JOB 1: Test & Code Quality
  # Runs on every push and pull request
  # ───────────────────────────────────────────────────────────────────────────
  test:
    name: Test & SonarCloud Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # Full history needed for SonarCloud blame data

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm run test:ci
        env:
          NODE_ENV: test
          MONGO_URI: ${{ secrets.MONGO_URI }}
          ORDER_SERVICE_URL: http://localhost:4000
          USER_SERVICE_URL: ${{ secrets.USER_SERVICE_URL }}

      - name: SonarCloud Scan (SAST)
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 2: Build & Push Docker Image to AWS ECR
  # Only runs on push to main (not on pull requests)
  # ───────────────────────────────────────────────────────────────────────────
  build-and-push:
    name: Build & Push to ECR
    runs-on: ubuntu-latest
    needs: test                          # Only runs if tests pass
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    outputs:
      image-uri: ${{ steps.build-image.outputs.image-uri }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          # Build the Docker image
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:latest

          # Push both the versioned tag and latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

          # Output the full image URI for the next job
          echo "image-uri=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT
          echo "Image pushed: $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 3: Deploy to EC2
  # SSHs into the EC2 instance, pulls the new image, and restarts the container
  # ───────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Configure AWS credentials (for ECR login on EC2)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Get ECR registry URL
        id: ecr
        run: |
          ECR_REGISTRY=$(aws ecr describe-repositories \
            --repository-names $ECR_REPOSITORY \
            --query 'repositories[0].repositoryUri' \
            --output text | sed 's|/.*||')
          echo "registry=$ECR_REGISTRY" >> $GITHUB_OUTPUT

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          envs: AWS_REGION,ECR_REPOSITORY,IMAGE_TAG
          script: |
            # Authenticate Docker to ECR (EC2 uses its IAM Role — no hardcoded creds)
            aws ecr get-login-password --region $AWS_REGION | \
              docker login --username AWS --password-stdin \
              ${{ steps.ecr.outputs.registry }}

            # Pull the latest image
            docker pull ${{ steps.ecr.outputs.registry }}/$ECR_REPOSITORY:$IMAGE_TAG

            # Stop and remove the old container (ignore errors if it doesn't exist)
            docker stop product-service || true
            docker rm product-service || true

            # Run the new container
            docker run -d \
              --name product-service \
              --restart unless-stopped \
              -p 3000:3000 \
              -e NODE_ENV=production \
              -e PORT=3000 \
              -e MONGO_URI="${{ secrets.MONGO_URI }}" \
              -e ORDER_SERVICE_URL="${{ secrets.ORDER_SERVICE_URL }}" \
              -e USER_SERVICE_URL="${{ secrets.USER_SERVICE_URL }}" \
              ${{ steps.ecr.outputs.registry }}/$ECR_REPOSITORY:$IMAGE_TAG

            # Wait for health check to pass
            sleep 10
            docker ps | grep product-service
            echo "Deployment successful! Image: $IMAGE_TAG"

            # Clean up old images to save disk space on Free Tier EC2
            docker image prune -f
