# ─── SonarCloud Configuration ────────────────────────────────────────────────

sonar.projectKey=Macro-Hard-Ecom_Macro-Hard-Ecom-Product-Service
sonar.organization=macro-hard-ecom

# Project metadata
sonar.projectName=Product Service
sonar.projectVersion=1.0.0

# Source directory
sonar.sources=src
sonar.tests=tests
sonar.test.inclusions=tests/**/*.test.js

# Exclusions — don't analyse node_modules or coverage reports
sonar.exclusions=node_modules/**,coverage/**,**/*.test.js

# Coverage report location (generated by Jest)
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Language
sonar.language=js
